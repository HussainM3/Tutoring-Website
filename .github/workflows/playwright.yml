name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-24.04

    # Run everything inside the official Playwright environment to skip browser downloads entirely!
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      # options: --network host

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      # - name: Clear Playwright cache
      #   run: rm -rf ~/.cache/ms-playwright
      # - name: Install dependencies
      #   run: npm ci
      # - name: Install Playwright Browsers
      #   env:
      #     PLAYWRIGHT_HOST_PLATFORM_OVERRIDE: ubuntu24.04-x64
      #     DEBIAN_FRONTEND: noninteractive
      #   run: |
      #     sudo apt-get update
      #     npx playwright install-deps
      #     npx playwright install chromium firefox webkit
      - name: Start PHP server
        run: php -S localhost:8000 -t "tutoring site" &
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # deploy ONLY if the tests pass successfully!
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only deploy on actual code pushes, not pull requests
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: if0_42216136
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./tutoring site/ # Points to your PHP code folder
          server-dir: /htdocs/ # InfinityFree requires files to live in htdocs
